<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stone Publishing Brand Identity Guidelines</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
    }

    .fallback {
      text-align: center;
      padding: 12px;
      background: #ffffff;
      border-top: 1px solid #ddd;
    }

    .fallback a {
      display: inline-block;
      padding: 10px 16px;
      background: #000;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 14px;
    }

    .fallback a:hover {
      background: #333;
    }
  </style>
</head>
<body>

  <div class="container">
    <iframe src="Stone_Publishing%20Brand%20Identity%20Guidelines.pdf"></iframe>
  </div>

</html>
