<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stone Publishing Brand Identity Guidelines</title>
  <style>
    /* Reset and ensure the app takes up the full screen */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden; /* Prevents the main page from bouncing */
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }

    /* This wrapper is the "magic" fix for iOS scrolling */
    .pdf-wrapper {
      flex: 1;
      width: 100%;
      height: 100%;
      overflow-y: auto; 
      -webkit-overflow-scrolling: touch; /* Enables smooth momentum scrolling on iOS */
    }

    object, iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Fallback button for mobile users if the embed fails entirely */
    .mobile-fallback {
      display: none; /* Hidden by default */
      text-align: center;
      padding: 20px;
      background: white;
    }

    /* Show fallback only on small screens if needed, 
       or keep it inside the <object> as a fail-safe */
    .download-btn {
      display: inline-block;
      padding: 12px 24px;
      background: #000;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      margin-top: 10px;
    }

    @media (max-width: 768px) {
        /* Optional: Force a minimum height for the viewer on mobile */
        .pdf-wrapper { min-height: 80vh; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="pdf-wrapper">
      <object data="Stone_Publishing Brand Identity Guidelines.pdf" type="application/pdf">
        <div class="mobile-fallback" style="display:block;">
          <p>This browser cannot display the PDF directly.</p>
          <a class="download-btn" href="Stone_Publishing Brand Identity Guidelines.pdf" target="_blank">
            Open Brand Guidelines
          </a>
        </div>
      </object>
    </div>
  </div>

</body>
</html>
